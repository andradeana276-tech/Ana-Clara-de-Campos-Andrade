<!DOCTYPE html><!--O Doctype indica qual a linguagem da programação que está sendo usada,nesse caso,o HTNL.-->
<html lang="en"><!--início do código-->
<head><!--início do cabeçalho do documento.Dentro dessa tag pode ser inseridas folhas de estilo e scripts.Os itens inseridos aqui não aparecem no navegador.-->
    <meta charset="UTF-8"><!--indica quais seão os caracteres(character set ou charset)será utilizado para renderizar o texto da página.O UTF-8 indentifica os caracteres da língua portuguesa.-->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

</body>
</html>
